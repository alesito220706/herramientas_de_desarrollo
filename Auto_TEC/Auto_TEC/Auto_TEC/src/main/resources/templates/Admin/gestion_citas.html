<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Citas - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/gestion_citas.css">
</head>
<body>
    <div th:replace="fragments/headerAdmin :: headerAdmin"></div>

    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
        <!-- Alertas -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">Gestión de Citas</h1>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCrearCita">
                <i class="fas fa-plus me-1"></i>Nueva Cita
            </button>
        </div>

        <!-- Tabla de Citas -->
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Tipo</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th>Empleado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cita : ${citas}">
                        <td th:text="${cita.id}"></td>
                        <td>
                            <div th:if="${cita.usuario}">
                                <strong th:text="${cita.usuario.nombres}"></strong>
                                <br>
                                <small class="text-muted" th:text="${cita.usuario.email}"></small>
                            </div>
                        </td>
                        <td>
                            <span class="badge" th:classappend="${cita.tipoCita == 'VENTA' ? 'bg-success' : 
                                                               cita.tipoCita == 'SERVICIO' ? 'bg-info' : 
                                                               cita.tipoCita == 'FINANCIAMIENTO' ? 'bg-warning' : 'bg-secondary'}"
                                  th:text="${cita.tipoCita}">
                            </span>
                        </td>
                        <td>
                            <span th:text="${#temporals.format(cita.fechaCita, 'dd/MM/yyyy HH:mm')}"></span>
                        </td>
                        <td>
                            <span class="badge" th:classappend="${cita.estado == 'PENDIENTE' ? 'bg-warning' : 
                                                               cita.estado == 'CONFIRMADA' ? 'bg-success' : 
                                                               cita.estado == 'COMPLETADA' ? 'bg-info' : 'bg-danger'}"
                                  th:text="${cita.estado}">
                            </span>
                        </td>
                        <td>
                            <span th:if="${cita.empleado}" th:text="${cita.empleado.nombres}"></span>
                            <span th:unless="${cita.empleado}" class="text-muted">Sin asignar</span>
                        </td>
                        <td class="table-actions">
                            <!-- Editar - Ahora abre modal específico para esta cita -->
                            <button class="btn btn-sm btn-outline-primary" 
                                    data-bs-toggle="modal" 
                                    th:attr="data-bs-target=|#modalEditarCita${cita.id}|">
                                <i class="fas fa-edit"></i>
                            </button>
                            
                            <!-- Cambiar Estado -->
                            <div class="btn-group">
                                <button type="button" class="btn btn-sm btn-outline-secondary dropdown-toggle" 
                                        data-bs-toggle="dropdown">
                                    <i class="fas fa-cog"></i>
                                </button>
                                <ul class="dropdown-menu">
                                    <li th:each="estado : ${estadosCita}">
                                        <form th:action="@{/admin/ventas/cambiar-estado/{id}(id=${cita.id})}" method="post" class="d-inline">
                                            <input type="hidden" name="nuevoEstado" th:value="${estado}">
                                            <button type="submit" class="dropdown-item" th:text="${estado}"></button>
                                        </form>
                                    </li>
                                </ul>
                            </div>
                            
                            <!-- Eliminar -->
                            <form th:action="@{/admin/ventas/eliminar/{id}(id=${cita.id})}" method="post" class="d-inline"
                                  th:onclick="return confirm('¿Estás seguro de eliminar esta cita?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- ========== MODALES ========== -->

    <!-- Modal Crear Cita -->
    <div class="modal fade" id="modalCrearCita" tabindex="-1" aria-labelledby="modalCrearCitaLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalCrearCitaLabel">Crear Nueva Cita</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/admin/ventas/crear}" method="post">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Cliente *</label>
                                    <select class="form-select" name="usuarioId" required>
                                        <option value="">Seleccionar cliente</option>
                                        <option th:each="usuario : ${usuarios}" 
                                                th:value="${usuario.id}" 
                                                th:text="${usuario.nombres + ' - ' + usuario.email}">
                                        </option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Tipo de Cita *</label>
                                    <select class="form-select" name="tipoCita" required>
                                        <option value="">Seleccionar tipo</option>
                                        <option value="VENTA">VENTA</option>
                                        <option value="SERVICIO">SERVICIO</option>
                                        <option value="FINANCIAMIENTO">FINANCIAMIENTO</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Empleado</label>
                                    <select class="form-select" name="empleadoId">
                                        <option value="">Sin asignar</option>
                                        <option th:each="empleado : ${empleados}" 
                                                th:value="${empleado.id}" 
                                                th:text="${empleado.nombres}">
                                        </option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Fecha *</label>
                                    <input type="date" class="form-control" name="fechaCita" required
                                           th:attr="min=${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Hora *</label>
                                    <input type="time" class="form-control" name="horaCita" required
                                           min="09:00" max="18:00">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Duración (minutos)</label>
                                    <input type="number" class="form-control" name="duracionEstimada" value="60" min="15" step="15">
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Notas</label>
                            <textarea class="form-control" name="notas" rows="3" placeholder="Notas adicionales..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Crear Cita</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Editar Cita - UNO POR CADA CITA -->
    <div th:each="cita : ${citas}" th:id="'modalEditarCita' + ${cita.id}" 
         class="modal fade" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Cita #<span th:text="${cita.id}"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/admin/ventas/actualizar/{id}(id=${cita.id})}" method="post">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Cliente *</label>
                                    <select class="form-select" name="usuarioId" required>
                                        <option value="">Seleccionar cliente</option>
                                        <option th:each="usuario : ${usuarios}" 
                                                th:value="${usuario.id}" 
                                                th:text="${usuario.nombres + ' - ' + usuario.email}"
                                                th:selected="${cita.usuario != null && usuario.id == cita.usuario.id}">
                                        </option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Tipo de Cita *</label>
                                    <select class="form-select" name="tipoCita" required>
                                        <option value="">Seleccionar tipo</option>
                                        <option th:each="tipo : ${tiposCita}" 
                                                th:value="${tipo}" 
                                                th:text="${tipo}"
                                                th:selected="${tipo == cita.tipoCita}">
                                        </option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Estado</label>
                                    <select class="form-select" name="estado">
                                        <option th:each="estado : ${estadosCita}" 
                                                th:value="${estado}" 
                                                th:text="${estado}"
                                                th:selected="${estado == cita.estado}">
                                        </option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Empleado</label>
                                    <select class="form-select" name="empleadoId">
                                        <option value="">Sin asignar</option>
                                        <option th:each="empleado : ${empleados}" 
                                                th:value="${empleado.id}" 
                                                th:text="${empleado.nombres}"
                                                th:selected="${cita.empleado != null && empleado.id == cita.empleado.id}">
                                        </option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Fecha *</label>
                                    <input type="date" class="form-control" name="fechaCita" required
                                           th:value="${#temporals.format(cita.fechaCita, 'yyyy-MM-dd')}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Hora *</label>
                                    <input type="time" class="form-control" name="horaCita" required
                                           th:value="${#temporals.format(cita.fechaCita, 'HH:mm')}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Duración (minutos)</label>
                                    <input type="number" class="form-control" name="duracionEstimada" 
                                           th:value="${cita.duracionEstimada}" min="15" step="15">
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Notas</label>
                            <textarea class="form-control" name="notas" rows="3" 
                                      th:text="${cita.notas}"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Actualizar Cita</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
    <script src="/js/admin.js"></script>
    
</body>
</html>

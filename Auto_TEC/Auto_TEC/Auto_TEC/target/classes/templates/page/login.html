<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - AutoTec Motors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div th:fragment="loginForm">
        <div class="login-container">
            <a href="/index" class="btn-back"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
            <h1><i class="fas fa-user-circle"></i> Iniciar Sesión</h1>
            <form method="post" action="/auth/login" class="login-form">
                <div class="input-group">
                    <span class="input-icon"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" placeholder="Usuario" required>
                </div>
                <div class="input-group">
                    <span class="input-icon"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn-login">Ingresar <i class="fas fa-sign-in-alt"></i></button>
                <div th:if="${param.error}" style="color:#ff6b6b">Credenciales inválidas</div>
                <div th:if="${param.logout}" style="color:#4caf50">Sesión cerrada</div>
                <div th:if="${param.registroExitoso}" style="color:#4caf50">
                    ¡Registro exitoso! Por favor inicia sesión.
                </div>
                <div th:if="${param.accessDenied}" style="color:#ff6b6b">
                    No tienes permisos para acceder a esa página.
                </div>
            </form>
            <p th:if="${error}" style="color:red;" th:text="${error}"></p>
            <p>¿No tienes cuenta? <a href="/auth/registro">Regístrate</a></p>
        </div>
    </div>
</body>
</html>

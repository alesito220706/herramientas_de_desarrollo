<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoTec Motors - Financiamiento Premium</title>
 <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

  <!-- Vincular CSS externo -->
  <link rel="stylesheet" href="/css/financiamiento.css">
  
</head>
<body>
  <div th:replace="fragments/header :: header"></div>
  
 

  <div class="container mt-4">
    <h1 class="text-center mb-4">Opciones de Financiamiento Premium</h1>

    <form id="financiamientoForm" action="/financiamiento/solicitar" method="post">
      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" id="nombre" name="nombre" class="form-control" required>
      </div>
      
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" name="email" class="form-control" required>
      </div>
      
      <div class="mb-3">
        <label class="form-label">Modelo</label>
        <select id="modelo" name="modelo" class="form-select" required>
          <option value="sedan">Sedán</option>
          <option value="suv">SUV</option>
        </select>
      </div>
      
      <div class="mb-3">
        <label class="form-label">Mensaje</label>
        <textarea id="mensaje" name="mensaje" class="form-control" required></textarea>
      </div>
      
      <button type="submit" class="btn btn-primary">Enviar Solicitud</button>
    </form>
  </div>

  
  <!-- Footer -->
  <footer>
    © 2025 AutoTec Motors - Todos los derechos reservados
  </footer>
<!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Script personalizado para financiamiento -->
  <script src="/js/financiamiento.js"></script>

  
</body>
</html>

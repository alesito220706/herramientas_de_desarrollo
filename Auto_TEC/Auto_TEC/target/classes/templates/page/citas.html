<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AutoTec Motors - Agendar Cita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/index.css" />     </head>
<body>
        <div th:replace="fragments/header :: header"></div>

        <main>
        <section id="citas" class="container my-5">
            <h2 class="display-6">Agendar Cita </h2>
            <p class="lead">Bienvenido(a), <strong sec:authentication="name">Usuario</strong>. Completa el formulario para solicitar tu cita.</p>
            
                        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card p-4 shadow-sm">
                <h4 class="mb-4 text-primary"><i class="fas fa-calendar-plus me-2"></i>Solicitar Cita</h4>
                <form th:action="@{/citas/agendar}" method="post" th:object="${cita}">
                    
                                        
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Tipo de Cita *</label>
                                <select class="form-select" th:field="*{tipoCita}" required>
                                    <option value="">Seleccionar tipo</option>
                                    <option th:each="tipo : ${tiposCita}" 
                                            th:value="${tipo.name()}" 
                                            th:text="${tipo.descripcion}">
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-3">
                                <label class="form-label">Fecha *</label>
                                <input type="date" class="form-control" th:field="*{fechaFormulario}" required>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-3">
                                <label class="form-label">Hora *</label>
                                <input type="time" class="form-control" th:field="*{horaCita}" required>
                                <small class="text-muted">Horario: 9:00 AM - 6:00 PM</small>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Notas Adicionales</label>
                        <textarea class="form-control" th:field="*{notas}" rows="3" 
                                  placeholder="Describe el motivo de tu cita, modelo de interés, etc..."></textarea>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-paper-plane me-2"></i>Solicitar Cita
                        </button>
                    </div>
                </form>
            </div>
            
        </section>
    </main>
    
        <footer>
        <p>© 2025 AutoTec Motors - Todos los derechos reservados</p>
    </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/ventas.js"></script>
</body>
</html>

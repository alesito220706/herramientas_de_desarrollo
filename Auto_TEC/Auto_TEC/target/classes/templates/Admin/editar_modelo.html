<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Modelo - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/gestion_autos.css}">
</head>
<body>
    <div th:replace="fragments/headerAdmin :: headerAdmin"></div> 

    <!-- Main Content -->
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
        <!-- Alertas -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">Editar Modelo</h1>
            <a th:href="@{/admin/gestion_autos}" class="btn btn-secondary">
                <i class="fas fa-arrow-left me-1"></i>Volver
            </a>
        </div>

        <!-- Formulario de Edición -->
        <div class="card">
            <div class="card-body">
                <form id="editarModeloForm" th:action="@{/admin/gestion_autos/actualizar/{id}(id=${modelo.id})}" method="post" th:object="${modelo}" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Nombre *</label>
                                <input id="nombreEdit" name="nombre" type="text" class="form-control" th:field="*{nombre}" required maxlength="100">
                                <div class="invalid-feedback" data-field="nombre"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Marca *</label>
                                <input id="marcaEdit" name="marca" type="text" class="form-control" th:field="*{marca}" required maxlength="100">
                                <div class="invalid-feedback" data-field="marca"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Motor *</label>
                                <input id="motorEdit" name="motor" type="text" class="form-control" th:field="*{motor}" required maxlength="100">
                                <div class="invalid-feedback" data-field="motor"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Potencia *</label>
                                <input id="potenciaEdit" name="potencia" type="text" class="form-control" th:field="*{potencia}" required maxlength="100">
                                <div class="invalid-feedback" data-field="potencia"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Velocidad Máxima *</label>
                                <input id="velocidadEdit" name="velocidadMax" type="text" class="form-control" th:field="*{velocidadMax}" required maxlength="100">
                                <div class="invalid-feedback" data-field="velocidadMax"></div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Precio *</label>
                                <input id="precioEdit" name="precio" type="number" step="0.01" class="form-control" th:field="*{precio}" required>
                                <div class="invalid-feedback" data-field="precio"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Imagen (archivo o URL)</label>
                                <div class="mb-2">
                                    <input id="imagenFileEdit" name="imagen" type="file" accept="image/*" class="form-control">
                                </div>
                                <div class="mb-2">
                                    <input id="imagenUrlInput" name="imagenUrl" type="url" class="form-control" th:field="*{imagenUrl}">
                                    <div class="invalid-feedback" data-field="imagenUrl"></div>
                                </div>
                                <div class="mt-2">
                                    <img id="imagenPreview" src="" alt="Previsualización" class="img-fluid rounded" style="max-height:120px; display:none;" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22120%22%3E%3Crect fill=%22%23ddd%22 width=%22200%22 height=%22120%22/%3E%3Ctext fill=%22%23999%22 font-family=%22sans-serif%22 font-size=%2214%22 dy=%2210.5%22 font-weight=%22bold%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22%3ESin Imagen%3C/text%3E%3C/svg%3E';">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Stock *</label>
                                <input id="stockEdit" name="stock" type="number" class="form-control" th:field="*{stock}" min="0" required>
                                <div class="invalid-feedback" data-field="stock"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Categoría</label>
                                <select class="form-select" th:field="*{categoria}">
                                    <option value="HYPERCAR">HYPERCAR</option>
                                    <option value="SUPERCAR">SUPERCAR</option>
                                    <option value="SPORTS">SPORTS</option>
                                    <option value="LUXURY">LUXURY</option>
                                </select>
                            </div>
                            <div class="row">
                                <div class="col-6">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" th:field="*{destacado}">
                                        <label class="form-check-label">Destacado</label>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" th:field="*{activo}">
                                        <label class="form-check-label">Activo</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción *</label>
                        <textarea id="descripcionEdit" name="descripcion" class="form-control" th:field="*{descripcion}" rows="3" required></textarea>
                        <div class="invalid-feedback" data-field="descripcion"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Aceleración (0-100 km/h)</label>
                        <input id="aceleracionEdit" name="aceleracion" type="text" class="form-control" th:field="*{aceleracion}" placeholder="Ej: 2.5 segundos" maxlength="100">
                        <div class="invalid-feedback" data-field="aceleracion"></div>

                    <div class="mb-3">
                        <label class="form-label">Año</label>
                        <input id="anioEdit" name="anio" type="number" class="form-control" th:field="*{anio}">
                        <div class="invalid-feedback" data-field="anio"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Equipamiento</label>
                        <textarea id="equipamientoEdit" name="equipamiento" class="form-control" th:field="*{equipamiento}" rows="2"></textarea>
                        <div class="invalid-feedback" data-field="equipamiento"></div>
                    </div>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Actualizar Modelo
                        </button>
                        <a th:href="@{/admin/gestion_autos}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const input = document.getElementById('imagenUrlInput');
            const preview = document.getElementById('imagenPreview');
            if (input && preview) {
                const updatePreview = () => {
                    const val = input.value;
                    if (val) {
                        preview.src = val;
                        preview.style.display = 'block';
                    } else {
                        preview.style.display = 'none';
                    }
                };
                input.addEventListener('input', updatePreview);
                // init with current value
                updatePreview();
            }
            // AJAX submit for edit (inline validation + broadcast)
            const editarForm = document.getElementById('editarModeloForm');
            let bc = null;
            try { bc = new BroadcastChannel('modelos_channel'); } catch(e) { /* no soportado */ }
            if (editarForm) {
                editarForm.querySelectorAll('input, textarea, select').forEach(el => { el.addEventListener('input', () => { el.classList.remove('is-invalid'); const name = el.name || el.id.replace(/Edit$/, ''); const fb = editarForm.querySelector('.invalid-feedback[data-field="' + name + '"]'); if (fb) fb.textContent = ''; }); });
                editarForm.addEventListener('submit', async function (e) {
                    e.preventDefault();
                    if (!editarForm.checkValidity()) { editarForm.reportValidity(); return; }
                    const btn = editarForm.querySelector('button[type="submit"]'); if (btn) btn.disabled = true;
                    editarForm.querySelectorAll('.invalid-feedback').forEach(fb => fb.textContent = ''); editarForm.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
                    const formData = new FormData(editarForm);
                    try {
                        const response = await fetch(editarForm.action, { method: 'POST', body: formData, credentials: 'same-origin', headers: { 'X-Requested-With': 'XMLHttpRequest' } });
                        const ct = (response.headers.get('content-type') || '').toLowerCase();
                        if (response.ok) {
                            const model = Object.fromEntries(formData.entries());
                            try { const urlParts = editarForm.action.split('/'); const parsedId = urlParts[urlParts.length - 1] || urlParts[urlParts.length - 2]; model.id = parsedId; } catch (e) { model.id = null; }
                            model.destacado = formData.get('destacado') === 'on' || formData.get('destacado') === 'true';
                            model.activo = formData.get('activo') === 'on' || formData.get('activo') === 'true';
                            if (bc) bc.postMessage({ type: 'updated', model });
                            window.location.href = '/admin/gestion_autos';
                        } else {
                            if (ct.includes('application/json')) {
                                const json = await response.json();
                                if (json.errors) { Object.keys(json.errors).forEach(field => { const el = editarForm.querySelector('[name="' + field + '"]'); if (el) el.classList.add('is-invalid'); const fb = editarForm.querySelector('.invalid-feedback[data-field="' + field + '"]'); if (fb) fb.textContent = json.errors[field]; }); }
                                else if (json.message) { alert(json.message); }
                            } else if (ct.includes('text/html')) {
                                const text = await response.text(); try { const parser = new DOMParser(); const doc = parser.parseFromString(text, 'text/html'); const feedbacks = doc.querySelectorAll('.invalid-feedback[data-field]'); if (feedbacks.length) { feedbacks.forEach(fb => { const field = fb.getAttribute('data-field'); const msg = fb.textContent.trim(); const el = editarForm.querySelector('[name="' + field + '"]'); if (el) el.classList.add('is-invalid'); const localFb = editarForm.querySelector('.invalid-feedback[data-field="' + field + '"]'); if (localFb) localFb.textContent = msg; }); alert('Corrige los errores marcados en el formulario'); } else { alert('Error al actualizar (servidor): ' + text); } } catch (err) { alert('Error al actualizar (servidor): ' + err.message); }
                            } else { const text = await response.text(); alert('Error al actualizar (servidor): ' + text); }
                        }
                    } catch (err) { alert('Error de red: ' + err.message); } finally { if (btn) btn.disabled = false; }
                });
                const imagenFileEdit = document.getElementById('imagenFileEdit'); const imagenUrlInputEdit = document.getElementById('imagenUrlInput');
                if (imagenFileEdit) { imagenFileEdit.addEventListener('change', function () { const file = imagenFileEdit.files && imagenFileEdit.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function (e) { if (preview) { preview.src = e.target.result; preview.style.display = 'block'; } }; reader.readAsDataURL(file); }); }
                if (imagenUrlInputEdit && preview) { imagenUrlInputEdit.addEventListener('input', function () { const val = imagenUrlInputEdit.value; if (val) { preview.src = val; preview.style.display = 'block'; } else { preview.style.display = 'none'; } }); }
            }
        });
    </script>
    
</body>
</html>

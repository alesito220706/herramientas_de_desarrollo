<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestión de Autos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/gestion_autos.css}">
    
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div th:replace="fragments/headerAdmin :: headerAdmin"></div> 
            
            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <!-- Alertas -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Gestión de Modelos</h1>
                            <div class="d-flex gap-2">
                                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCrearModelo">Agregar Modelo</button>
                                <button id="btnMigrarImagenes" class="btn btn-outline-info">Migrar Imágenes</button>
                            </div>
                    
                </div>

                <!-- Tabla de Modelos -->
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Marca</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Destacado</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="modelo : ${modelos}">
                                <td>
                                    <img th:src="${modelo.imagenUrl}" 
                                        alt="Imagen" 
                                        class="modelo-img" 
                                        onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22120%22%3E%3Crect fill=%22%23ddd%22 width=%22200%22 height=%22120%22/%3E%3Ctext fill=%22%23999%22 font-family=%22sans-serif%22 font-size=%2214%22 dy=%2210.5%22 font-weight=%22bold%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22%3ESin Imagen%3C/text%3E%3C/svg%3E';">
                                </td>
                                
                                <td th:text="${modelo.nombre}"></td>
                                <td th:text="${modelo.marca}"></td>
                                <td th:text="'$' + ${#numbers.formatDecimal(modelo.precio, 1, 2, 'COMMA')}"></td>
                                <td th:text="${modelo.stock}"></td>
                                
                                <td>
                                    <span th:if="${modelo.destacado}" class="badge bg-warning">
                                        <i class="fas fa-star"></i> Destacado
                                    </span>
                                </td>
                                
                                <td>
                                    <span th:if="${modelo.activo}" class="badge bg-success status-badge">Activo</span>
                                    <span th:unless="${modelo.activo}" class="badge bg-danger status-badge">Inactivo</span>
                                </td>
                                
                                <td class="table-actions">
                                    <a th:href="@{/admin/gestion_autos/editar/{id}(id=${modelo.id})}" 
                                    class="btn btn-sm btn-outline-primary" title="Editar">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    
                                    <form th:action="@{/admin/gestion_autos/toggle-activo/{id}(id=${modelo.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm" 
                                                th:classappend="${modelo.activo} ? 'btn-outline-warning' : 'btn-outline-success'"
                                                th:title="${modelo.activo} ? 'Desactivar' : 'Activar'">
                                            <i th:classappend="${modelo.activo} ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                                        </button>
                                    </form>
                                    
                                    <form th:action="@{/admin/gestion_autos/eliminar/{id}(id=${modelo.id})}" method="post" class="d-inline"
                                        th:onclick="return confirm('¿Estás seguro de eliminar este modelo?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Eliminar">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

   

    <!-- Modal Crear Modelo -->
<div class="modal fade" id="modalCrearModelo" tabindex="-1" aria-labelledby="modalCrearModeloLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">

            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title" id="modalCrearModeloLabel">Registrar Nuevo Modelo</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <form id="crearModeloForm" th:action="@{/admin/gestion_autos/crear}" method="post" th:object="${modelo}" enctype="multipart/form-data">
                <div class="modal-body">

                    <div class="row g-3">

                        <!-- Nombre -->
                        <div class="col-md-6">
                            <label class="form-label">Nombre del Modelo *</label>
                            <input id="nombreInput" type="text" class="form-control" th:field="*{nombre}" required>
                            <div class="invalid-feedback" data-field="nombre"></div>
                        </div>

                        <!-- Marca -->
                        <div class="col-md-6">
                            <label class="form-label">Marca *</label>
                            <input id="marcaInput" type="text" class="form-control" th:field="*{marca}" required>
                            <div class="invalid-feedback" data-field="marca"></div>
                        </div>

                        <!-- Motor -->
                        <div class="col-md-6">
                            <label class="form-label">Motor *</label>
                            <input id="motorInput" type="text" class="form-control" th:field="*{motor}" required>
                            <div class="invalid-feedback" data-field="motor"></div>
                        </div>

                        <!-- Potencia -->
                        <div class="col-md-6">
                            <label class="form-label">Potencia *</label>
                            <input id="potenciaInput" type="text" class="form-control" th:field="*{potencia}" required>
                            <div class="invalid-feedback" data-field="potencia"></div>
                        </div>

                        <!-- Velocidad Máxima -->
                        <div class="col-md-6">
                            <label class="form-label">Velocidad Máx *</label>
                            <input id="velocidadInput" type="text" class="form-control" th:field="*{velocidadMax}" required>
                            <div class="invalid-feedback" data-field="velocidadMax"></div>
                        </div>

                        <!-- Aceleración -->
                        <div class="col-md-6">
                            <label class="form-label">Aceleración</label>
                            <input id="aceleracionInput" type="text" class="form-control" th:field="*{aceleracion}">
                            <div class="invalid-feedback" data-field="aceleracion"></div>
                        </div>
                        <!-- Año -->
                         
            <div class="col-md-4">
                <label class="form-label">Año</label>
                <input id="anioInput" type="number" th:field="*{anio}" class="form-control">
                <div class="invalid-feedback" data-field="anio"></div>
            </div>

                        <!-- Precio -->
                        <div class="col-md-6">
                            <label class="form-label">Precio (USD) *</label>
                            <input id="precioInput" type="number" step="0.01" min="0" class="form-control" th:field="*{precio}" required>
                            <div class="invalid-feedback" data-field="precio"></div>
                        </div>

                        <!-- Stock -->
                        <div class="col-md-6">
                            <label class="form-label">Stock *</label>
                            <input id="stockInput" type="number" min="1" class="form-control" th:field="*{stock}" required>
                            <div class="invalid-feedback" data-field="stock"></div>
                        </div>
                        
                        <div class="col-12">
                <label class="form-label">Equipamiento</label>
                <textarea id="equipamientoInput" th:field="*{equipamiento}" rows="2" class="form-control"></textarea>
                <div class="invalid-feedback" data-field="equipamiento"></div>
            </div>


                        <!-- Imagen: archivo o URL -->
                        <div class="col-md-12">
                            <label class="form-label">Imagen (archivo o URL)</label>
                            <div class="mb-2">
                                <input id="imagenFileCreate" name="imagen" type="file" accept="image/*" class="form-control">
                            </div>
                            <!-- URL field removed; create via file upload only -->
                            <div class="mt-2">
                                <img id="imagenPreviewCreate" src="" alt="Previsualización" class="img-fluid rounded" style="max-height:120px; display:none;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22120%22%3E%3Crect fill=%22%23ddd%22 width=%22200%22 height=%22120%22/%3E%3Ctext fill=%22%23999%22 font-family=%22sans-serif%22 font-size=%2214%22 dy=%2210.5%22 font-weight=%22bold%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22%3ESin Imagen%3C/text%3E%3C/svg%3E'">
                            </div>
                        </div>

                        <!-- Categoría -->
                        <div class="col-md-6">
                            <label class="form-label">Categoría</label>
                            <select class="form-select" th:field="*{categoria}">
                                <option value="HYPERCAR">Hypercar</option>
                                <option value="SUPERDEPORTIVO">Superdeportivo</option>
                                <option value="DEPORTIVO">Deportivo</option>
                                <option value="SUV">SUV</option>
                                <option value="LUJO">Lujo</option>
                            </select>
                        </div>

                        <!-- Destacado -->
                        <div class="col-md-3 mt-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{destacado}">
                                <label class="form-check-label">Destacado</label>
                            </div>
                        </div>

                        <!-- Activo -->
                        <div class="col-md-3 mt-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{activo}" checked>
                                <label class="form-check-label">Activo</label>
                            </div>
                        </div>

                        <!-- Descripción -->
                        <div class="col-md-12">
                            <label class="form-label">Descripción *</label>
                            <textarea class="form-control" rows="4" th:field="*{descripcion}" required></textarea>
                        </div>

                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Modelo</button>
                </div>

            </form>
        </div>
    </div>
</div>


    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>
    <!-- Script para crear modelo vía AJAX y broadcast (igual que en target) -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const crearForm = document.getElementById('crearModeloForm');
            const modalEl = document.getElementById('modalCrearModelo');
            let bc = null;
            try { bc = new BroadcastChannel('modelos_channel'); } catch(e) { /* no soportado */ }

            function escapeHtml(s) {
                if (!s) return '';
                return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/\'/g, '&#039;');
            }

            // Migrar imágenes (btn) -> POST /admin/gestion_autos/migrate-images
            const btnMigrar = document.getElementById('btnMigrarImagenes');
            if (btnMigrar) {
                btnMigrar.addEventListener('click', async function () {
                    if (!confirm('¿Deseas ejecutar la migración de imágenes? Por defecto se ejecuta en modo dryRun (ver cambios, no copia).')) return;
                    const dryRun = confirm('¿Modo dryRun? Presiona Aceptar para dry run (no copia), Cancelar para ejecutar copia real.');
                    btnMigrar.disabled = true;
                    try {
                        const resp = await fetch('/admin/gestion_autos/migrate-images', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: 'dryRun=' + (dryRun ? 'true' : 'false') });
                        const json = await resp.json();
                        let msg = `Migración completada. Procesados: ${json.total}`;
                        showAlert(msg, 'info');
                        console.info('Migration result', json);
                    } catch (err) {
                        console.error('Error migrating images:', err);
                        showAlert('Error migrando imágenes: ' + err.message, 'danger');
                    } finally { btnMigrar.disabled = false; }
                });
            }

            function appendModelToTable(model) {
                const tbody = document.querySelector('table tbody');
                if (!tbody) return;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <img src="${escapeHtml(model.imagenUrl)}" alt="Imagen" class="modelo-img" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22120%22%3E%3Crect fill=%22%23ddd%22 width=%22200%22 height=%22120%22/%3E%3Ctext fill=%22%23999%22 font-family=%22sans-serif%22 font-size=%2214%22 dy=%2210.5%22 font-weight=%22bold%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22%3ESin Imagen%3C/text%3E%3C/svg%3E'">
                    </td>
                    <td>${escapeHtml(model.nombre)}</td>
                    <td>${escapeHtml(model.marca)}</td>
                    <td>$${(Number(model.precio) || 0).toFixed(2)}</td>
                    <td>${escapeHtml(model.stock)}</td>
                    <td>${model.destacado ? '<span class="badge bg-warning"><i class="fas fa-star"></i> Destacado</span>' : ''}</td>
                    <td>
                        <span class="badge ${model.activo ? 'bg-success' : 'bg-danger'} status-badge">${model.activo ? 'Activo' : 'Inactivo'}</span>
                    </td>
                    <td class="table-actions">
                        <a href="/admin/gestion_autos/editar/${model.id}" class="btn btn-sm btn-outline-primary" title="Editar"><i class="fas fa-edit"></i></a>
                        <form action="/admin/gestion_autos/toggle-activo/${model.id}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm ${model.activo ? 'btn-outline-warning' : 'btn-outline-success'}" title="${model.activo ? 'Desactivar' : 'Activar'}">
                                <i class="${model.activo ? 'fas fa-eye-slash' : 'fas fa-eye'}"></i>
                            </button>
                        </form>
                        <form action="/admin/gestion_autos/eliminar/${model.id}" method="post" class="d-inline" onsubmit="return confirm('¿Estás seguro de eliminar este modelo?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Eliminar"><i class="fas fa-trash"></i></button>
                        </form>
                    </td>`;
                tbody.prepend(tr);
            }

            function showAlert(message, type) {
                const main = document.querySelector('.main-content');
                if (!main) return;
                const alert = document.createElement('div');
                alert.className = `alert alert-${type} alert-dismissible fade show`;
                alert.role = 'alert';
                alert.innerHTML = `${escapeHtml(message)}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
                main.prepend(alert);
                setTimeout(() => { try { alert.remove(); } catch(_) {} }, 4000);
            }

            if (crearForm) {
                crearForm.addEventListener('submit', async function (e) {
                    e.preventDefault();
                    if (!crearForm.checkValidity()) { crearForm.reportValidity(); return; }
                    const btn = crearForm.querySelector('button[type="submit"]');
                    if (btn) btn.disabled = true;
                    crearForm.querySelectorAll('.invalid-feedback').forEach(fb => fb.textContent = '');
                    crearForm.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
                    const formData = new FormData(crearForm);
                    try {
                        const response = await fetch(crearForm.action, { method: 'POST', body: formData, credentials: 'same-origin', headers: { 'X-Requested-With': 'XMLHttpRequest' } });
                        const ct = (response.headers.get('content-type') || '').toLowerCase();
                        if (response.ok) {
                            let model = {
                                id: Date.now(),
                                nombre: formData.get('nombre'),
                                marca: formData.get('marca'),
                                motor: formData.get('motor'),
                                potencia: formData.get('potencia'),
                                velocidadMax: formData.get('velocidadMax'),
                                aceleracion: formData.get('aceleracion'),
                                anio: formData.get('anio'),
                                precio: formData.get('precio'),
                                stock: formData.get('stock'),
                                equipamiento: formData.get('equipamiento'),
                                imagenUrl: formData.get('imagenUrl'),
                                categoria: formData.get('categoria'),
                                destacado: formData.get('destacado') === 'on' || formData.get('destacado') === 'true',
                                activo: formData.get('activo') === 'on' || formData.get('activo') === 'true',
                                descripcion: formData.get('descripcion')
                            };
                            if (ct.includes('application/json')) {
                                try {
                                    const json = await response.json();
                                    if (json && json.model) model = json.model;
                                    else if (json && json.id) model = json;
                                } catch (err) { /* ignore */ }
                            }
                            appendModelToTable(model);
                            showAlert('Modelo creado correctamente', 'success');
                            try { const bootstrapModal = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl); bootstrapModal.hide(); } catch (_) {}
                            crearForm.reset();
                            if (bc) bc.postMessage({ type: 'created', model });
                        } else if (response.status === 0 || response.status === 302 || response.redirected) {
                            showAlert('Modelo creado (redirigido). Actualiza la página si corresponde.', 'success');
                        } else {
                            if (ct.includes('application/json')) {
                                const json = await response.json();
                                if (json.errors) {
                                    Object.keys(json.errors).forEach(field => {
                                        const el = crearForm.querySelector('[name="' + field + '"]') || document.getElementById(field + 'Input');
                                        if (el) el.classList.add('is-invalid');
                                        const fb = crearForm.querySelector('.invalid-feedback[data-field="' + field + '"]');
                                        if (fb) fb.textContent = json.errors[field];
                                    });
                                    showAlert('Corrige los errores marcados en el formulario', 'danger');
                                } else if (json.message) { showAlert(json.message, 'danger'); }
                            } else if (ct.includes('text/html')) {
                                const text = await response.text();
                                try {
                                    const parser = new DOMParser();
                                    const doc = parser.parseFromString(text, 'text/html');
                                    const feedbacks = doc.querySelectorAll('.invalid-feedback[data-field]');
                                    if (feedbacks.length) {
                                        feedbacks.forEach(fb => {
                                            const field = fb.getAttribute('data-field');
                                            const msg = fb.textContent.trim();
                                            const el = crearForm.querySelector('[name="' + field + '"]') || document.getElementById(field + 'Input');
                                            if (el) el.classList.add('is-invalid');
                                            const localFb = crearForm.querySelector('.invalid-feedback[data-field="' + field + '"]');
                                            if (localFb) localFb.textContent = msg;
                                        });
                                        showAlert('Corrige los errores marcados en el formulario', 'danger');
                                    } else {
                                        showAlert('Error al crear el modelo', 'danger');
                                        console.error('Error crear modelo:', response.status, text);
                                    }
                                } catch (err) { showAlert('Error al crear el modelo', 'danger'); }
                            } else {
                                const text = await response.text();
                                showAlert('Error al crear el modelo', 'danger');
                                console.error('Error crear modelo:', response.status, text);
                            }
                        }
                    } catch (err) { showAlert('Error de red: ' + err.message, 'danger'); }
                    finally { if (btn) btn.disabled = false; }
                });

                // preview handling for file and url
                const imagenFileCreate = document.getElementById('imagenFileCreate');
                const imagenPreviewCreate = document.getElementById('imagenPreviewCreate');
                if (imagenFileCreate && imagenPreviewCreate) {
                    imagenFileCreate.addEventListener('change', function () {
                        const file = imagenFileCreate.files && imagenFileCreate.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function (e) { imagenPreviewCreate.src = e.target.result; imagenPreviewCreate.style.display = 'block'; }; reader.readAsDataURL(file);
                    });
                }
                // no URL input on create form - preview only from file input
            }
        });
    </script>
    
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Empleados - Auto TEC</title>
     <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
<link rel="stylesheet" th:href="@{/css/gestion_empleados.css}">
</head>
<body>
    <div th:replace="fragments/headerAdmin :: headerAdmin"></div>
     
    <div class="container-fluid">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1><i class="fas fa-briefcase"></i> Gestión de Empleados</h1>
            <button class="btn-add" onclick="abrirModalEmpleado()">
                <i class="fas fa-plus"></i> Agregar Empleado
            </button>
        </div>

        <div th:if="${mensaje}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${mensaje}"></span>
        </div>
        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <div class="search-section">
            <input type="text" class="form-control" placeholder="Buscar empleado..." onkeyup="filtrarTabla('tablaEmpleados', this)">
        </div>

        <div class="table-responsive">
            <table class="table" id="tablaEmpleados">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombres</th>
                        <th>Apellidos</th>
                        <th>Email</th>
                        <th>Teléfono</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="empleado : ${empleados}">
                        <td th:text="${empleado.id}"></td>
                        <td th:text="${empleado.nombres}"></td>
                        <td th:text="${empleado.apellidos}"></td>
                        <td th:text="${empleado.email}"></td>
                        <td th:text="${empleado.telefono}"></td>
                        <td><span class="badge bg-info" th:text="${empleado.rol.nombre}"></span></td>
                        <td>
                            <span class="badge" th:classappend="${empleado.activo} ? 'bg-success' : 'bg-danger'" 
                                  th:text="${empleado.activo} ? 'Activo' : 'Inactivo'"></span>
                        </td>
                        <td>
                            <button class="btn-delete" 
                                    th:data-empleado-id="${empleado.id}"
                                    th:data-empleado-nombre="${empleado.nombres}"
                                    onclick="confirmarEliminarEmpleado(this.dataset.empleadoId, this.dataset.empleadoNombre)">
                                <i class="fas fa-trash"></i> Eliminar
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal para agregar empleado -->
    <div class="modal fade" id="modalEmpleado" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Agregar Empleado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formEmpleado" th:action="@{/admin/empleados/guardar}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Nombres *</label>
                            <input type="text" name="nombres" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Apellidos *</label>
                            <input type="text" name="apellidos" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email *</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" name="telefono" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Rol *</label>
                            <select name="roles_id" class="form-select" required>
                                <option value="">Selecciona un rol</option>
                                <option value="2">VENDEDOR</option>
                                <option value="3">ADMIN</option>
                                <option value="4">GERENTE</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Fecha de Contratación</label>
                            <input type="date" name="fechaContratacion" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-check-label">
                                <input type="checkbox" name="activo" class="form-check-input" checked> Empleado Activo
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Guardar Empleado</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Archivo JS externo -->
    <script th:src="@{/js/admin.js}"></script>
</body>
</html>
